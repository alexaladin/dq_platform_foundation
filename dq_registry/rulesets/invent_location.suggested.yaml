dataset_id: invent_location
ruleset_version: 1
owner_team: UNKNOWN
data_owner: UNKNOWN
rules:
- rule_id: SUG_invent_location_material_id_not_null
  rule_type: completeness
  severity: medium
  expectation:
    column: material_id
    max_null_percent: 0
- rule_id: SUG_invent_location_unit_of_measure_domain
  rule_type: domain
  severity: high
  expectation:
    column: unit_of_measure
    allowed_values:
    - kg
    - m
    - g
    - l
    - pcs
- rule_id: SUG_invent_location_weight_not_null
  rule_type: completeness
  severity: medium
  expectation:
    column: weight
    max_null_percent: 0
- rule_id: SUG_invent_location_created_at_not_null
  rule_type: completeness
  severity: medium
  expectation:
    column: created_at
    max_null_percent: 0
