dataset_id: goods_movements
ruleset_version: 1
owner_team: SupplyChain
data_owner: owner@example.com
rules:
- rule_id: schema_0001
  rule_type: schema
  expectation:
    required_columns:
    - movement_id
    - material_id
    - quantity
    - movement_type
    - plant
    - movement_date
    - ts_load
    - forecast_date
  severity: high
  description: 'Deterministic schema: required columns from dataset config'
  suggested_by: dataset_config
- rule_id: freshness_0001
  rule_type: freshness
  expectation:
    ts_column: ts_load
    max_age_days: 10
  severity: medium
  description: 'Deterministic freshness: 10 days max age'
  suggested_by: dataset_config
- rule_id: U001
  rule_type: uniqueness
  severity: high
  expectation:
    column: movement_id
  suggested_by: key_detection_engine
- rule_id: C001
  rule_type: completeness
  severity: high
  expectation:
    column: movement_id
  suggested_by: key_detection_engine
- rule_id: C002
  rule_type: completeness
  severity: medium
  expectation:
    column: material_id
  suggested_by: ai_patcher
  ai_confidence: 0.98
  ai_rationale: material_id is a critical foreign identifier, and its nearly complete
    presence warrants a rule to detect sporadic nulls.
  ai_evidence_used: 'Non_null_count: 499 out of 500.'
- rule_id: C003
  rule_type: completeness
  severity: high
  expectation:
    column: quantity
  suggested_by: ai_patcher
  ai_confidence: 1.0
  ai_rationale: Business process requires each movement to have a non-null quantity.
  ai_evidence_used: '0% nulls in 500 rows; business context: ''number of moved units''.'
- rule_id: R001
  rule_type: range
  severity: high
  expectation:
    column: quantity
    min: 0.0
    max: 24.31
  suggested_by: ai_patcher
  ai_confidence: 0.98
  ai_rationale: Business context and statistical profiling indicate quantity must
    be non-negative (direction encoded elsewhere). Maximum based on observed profile.
  ai_evidence_used: 'Business context: ''quantity must be non-negative''. Profiling:
    min=-5.0 (data error), but p01=0.6497; so min=0.0 preferred.'
- rule_id: C004
  rule_type: completeness
  severity: high
  expectation:
    column: movement_type
  suggested_by: ai_patcher
  ai_confidence: 1.0
  ai_rationale: All records should have a movement_type to correctly interpret journal
    entries.
  ai_evidence_used: 0% nulls; 500 non-null entries.
- rule_id: D001
  rule_type: domain
  severity: high
  expectation:
    column: movement_type
    allowed_values:
    - RECEIPT
    - ISSUE
    - TRANSFER
    - MOVE
  suggested_by: ai_patcher
  ai_confidence: 0.99
  ai_rationale: movement_type has a well-defined and limited set of possible values
    per top_values.
  ai_evidence_used: top_values includes exactly four types as per business semantics
    and profile.
- rule_id: C005
  rule_type: completeness
  severity: high
  expectation:
    column: plant
  suggested_by: ai_patcher
  ai_confidence: 1.0
  ai_rationale: plant is required for physical routing of goods.
  ai_evidence_used: 0% nulls, 500 non-null entries.
- rule_id: D002
  rule_type: domain
  severity: high
  expectation:
    column: plant
    allowed_values:
    - PL02
    - PL01
    - PL03
  suggested_by: ai_patcher
  ai_confidence: 0.99
  ai_rationale: plant codes are limited to three known values.
  ai_evidence_used: 'Distinct_count: 3; top_values strictly enumerate the allowed
    set.'
- rule_id: C006
  rule_type: completeness
  severity: high
  expectation:
    column: movement_date
  suggested_by: ai_patcher
  ai_confidence: 1.0
  ai_rationale: movement_date is necessary to establish movement timing for all records.
  ai_evidence_used: 0% nulls; 500/500 non-null.
- rule_id: T001
  rule_type: date_not_in_future
  severity: high
  expectation:
    column: movement_date
  suggested_by: ai_patcher
  ai_confidence: 0.98
  ai_rationale: Business context explicitly states movement_date cannot be in the
    future.
  ai_evidence_used: Explicit in deterministic context; supports validation against
    future dates.
- rule_id: C007
  rule_type: completeness
  severity: high
  expectation:
    column: ts_load
  suggested_by: ai_patcher
  ai_confidence: 1.0
  ai_rationale: ts_load should always be present for every row as a technical row-load
    timestamp.
  ai_evidence_used: 0% nulls in profile.
- rule_id: D003
  rule_type: domain
  severity: medium
  expectation:
    column: ts_load
    allowed_values:
    - 2/26/2026
  suggested_by: ai_patcher
  ai_confidence: 1.0
  ai_rationale: ts_load has a single observed allowed value and should not deviate
    per profile.
  ai_evidence_used: top_values shows exactly one date; platform baseline expects tight
    control.
- rule_id: C008
  rule_type: completeness
  severity: high
  expectation:
    column: forecast_date
  suggested_by: ai_patcher
  ai_confidence: 1.0
  ai_rationale: forecast_date is required for downstream scheduled logistics.
  ai_evidence_used: 0% nulls, 500/500 non-null.
- rule_id: D004
  rule_type: domain
  severity: medium
  expectation:
    column: forecast_date
    allowed_values:
    - 2/26/2026
  suggested_by: ai_patcher
  ai_confidence: 1.0
  ai_rationale: Only a single forecast_date present; requires controlled value with
    current dataset.
  ai_evidence_used: top_values shows only one allowed value.
- rule_id: A001
  rule_type: anomaly_detection
  severity: medium
  expectation:
    column: quantity
    method: non_negative
  suggested_by: ai_patcher
  ai_confidence: 0.99
  ai_rationale: Added from business context fallback when provider returned no anomaly
    rule.
  ai_evidence_used:
    business_context: Number of moved units. Must be non-negative. Direction is encoded
      by movement_type.
