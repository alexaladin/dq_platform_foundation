dataset_id: goods_movements
ruleset_version: 1
owner_team: SupplyChain
data_owner: owner@example.com
rules:
- rule_id: schema_0001
  rule_type: schema
  expectation:
    required_columns:
    - movement_id
    - material_id
    - quantity
    - movement_type
    - plant
    - movement_date
    - ts_load
    - forecast_date
  severity: high
  description: 'Deterministic schema: required columns from dataset config'
  suggested_by: dataset_config
- rule_id: freshness_0001
  rule_type: freshness
  expectation:
    ts_column: ts_load
    max_age_days: 10
  severity: medium
  description: 'Deterministic freshness: 10 days max age'
  suggested_by: dataset_config
- rule_id: U001
  rule_type: uniqueness
  severity: high
  expectation:
    column: movement_id
  suggested_by: key_detection_engine
- rule_id: C001
  rule_type: completeness
  severity: high
  expectation:
    column: movement_id
  suggested_by: key_detection_engine
- rule_id: C002
  rule_type: completeness
  severity: high
  expectation:
    column: material_id
  suggested_by: ai_patcher
  ai_confidence: 0.98
  ai_rationale: Material code is required for interpreting movements; near-zero nulls
    suggest high reliability.
  ai_evidence_used: material_id has only 0.2% nulls, essential for movement tracking.
- rule_id: C003
  rule_type: completeness
  severity: high
  expectation:
    column: quantity
  suggested_by: ai_patcher
  ai_confidence: 1.0
  ai_rationale: Quantity must always be specified for any goods movement, essential
    for analytics and operations.
  ai_evidence_used: quantity column has 0% nulls.
- rule_id: C004
  rule_type: completeness
  severity: high
  expectation:
    column: movement_type
  suggested_by: ai_patcher
  ai_confidence: 1.0
  ai_rationale: Movement type is vital to interpret the direction and purpose of the
    goods transaction.
  ai_evidence_used: 0% missing, fixed set of types observed.
- rule_id: C005
  rule_type: completeness
  severity: high
  expectation:
    column: plant
  suggested_by: ai_patcher
  ai_confidence: 1.0
  ai_rationale: Plant information is critical for logistical traceability.
  ai_evidence_used: No missing values in plant column.
- rule_id: C006
  rule_type: completeness
  severity: high
  expectation:
    column: movement_date
  suggested_by: ai_patcher
  ai_confidence: 1.0
  ai_rationale: A movement must always have an associated date for audit trail validity.
  ai_evidence_used: Profiling confirms 0% nulls.
- rule_id: D001
  rule_type: domain
  severity: high
  expectation:
    column: movement_type
    allowed_values:
    - RECEIPT
    - ISSUE
    - TRANSFER
    - MOVE
  suggested_by: ai_patcher
  ai_confidence: 0.99
  ai_rationale: Ensures only known, supported movement types are permitted.
  ai_evidence_used: 'All values in top 4: RECEIPT, ISSUE, TRANSFER, MOVE; aligns with
    business context.'
- rule_id: D002
  rule_type: domain
  severity: high
  expectation:
    column: plant
    allowed_values:
    - PL02
    - PL01
    - PL03
  suggested_by: ai_patcher
  ai_confidence: 0.99
  ai_rationale: Restricts plant codes to the known set, supporting operational consistency.
  ai_evidence_used: plant shows three consistent values with no other top values.
- rule_id: D003
  rule_type: domain
  severity: medium
  expectation:
    column: ts_load
    allowed_values:
    - 2/26/2026
  suggested_by: ai_patcher
  ai_confidence: 1.0
  ai_rationale: Loaded timestamp is always the same, ensuring batch integrity.
  ai_evidence_used: All 500 records have '2/26/2026' in ts_load.
- rule_id: D004
  rule_type: domain
  severity: medium
  expectation:
    column: forecast_date
    allowed_values:
    - 2/26/2026
  suggested_by: ai_patcher
  ai_confidence: 1.0
  ai_rationale: Forecast date is constant per dataset, simplifying time-aligned analysis.
  ai_evidence_used: Single top value (2/26/2026) for all forecast_date entries.
- rule_id: R001
  rule_type: range
  severity: high
  expectation:
    column: quantity
    min: 0.0
    max: 24.31
  suggested_by: ai_patcher
  ai_confidence: 0.98
  ai_rationale: Enforces non-negative units as required by business; catches miscoded
    negatives.
  ai_evidence_used: Business logic (must be non-negative); observed min of -5.0, but
    min restricted to 0 due to context, max = 24.31 as per data.
- rule_id: T001
  rule_type: date_not_in_future
  severity: high
  expectation:
    column: movement_date
  suggested_by: ai_patcher
  ai_confidence: 0.99
  ai_rationale: Prevents registration of movements for dates not yet possible.
  ai_evidence_used: 'Business context: movement_date cannot be in the future.'
- rule_id: A001
  rule_type: anomaly_detection
  severity: high
  expectation:
    column: quantity
    method: non_negative
  suggested_by: ai_patcher
  ai_confidence: 0.97
  ai_rationale: Highlights unusual quantity values far from the mean, suggesting data
    entry errors or process issues. Method normalized to non_negative from zscore
    by business context.
  ai_evidence_used: quantity has std=4.63, z-score threshold 3.0 covers typical business
    outliers.
