datasets:
  - dataset_id: materials_master
    dataset_description: "Product dictionary with master data for materials."
    columns_description:
      material_id: "Material code; a 6-character string."
      material_name: "Material or product name."
      unit_of_measure: "Unit of measure, for example ml, g, l, kg."
      created_at: "Date when the material was added to the dictionary."
      ts_load: "Date when the dataset was refreshed by the data load process."
    source_type: csv
    source_location: data/raw/materials_master.csv
    owner_team: SupplyChain
    data_owner: owner@example.com
    sla_tier: gold
    required_columns: [ts_load]
    ts_load_column: ts_load
    freshness_max_age_days: 2

  - dataset_id: goods_movements
    dataset_description: "Goods movement journal; quantity is moved units."
    columns_description:
      movement_id: "Movement ID generated by the system."
      material_id: "Material code; a 6-character string."
      quantity: "Number of moved units. Must be non-negative. Direction is encoded by movement_type."
      movement_type: "Movement type code (RECEIPT/ISSUE/TRANSFER/MOVE)."
      plant: "Destination or processing plant code from a limited set."
      movement_date: "Date when the movement was initiated; cannot be in the future."
      ts_load: "Date when the dataset was refreshed by the data load process."
      forecast_date: "Estimated movement completion date."
    source_type: csv
    source_location: data/raw/goods_movements.csv
    owner_team: SupplyChain
    data_owner: owner@example.com
    sla_tier: gold
    required_columns: [movement_id, material_id, quantity, movement_type, plant, movement_date, ts_load, forecast_date]
    ts_load_column: ts_load
    freshness_max_age_days: 10

  - dataset_id: view_goods_movements
    dataset_description: "Goods movement journal view for reporting; Contains data with movement_type = 'TRANSFER' only"
    columns_description:
      movement_id: "Movement ID generated by the system."
      material_id: "Material code; a 6-character string."
      quantity: "Number of moved units. Must be non-negative. Direction is encoded by movement_type."
      movement_type: "Movement type code (TRANSFER)."
      plant: "Destination or processing plant code from a limited set."
      movement_date: "Date when the movement was initiated; cannot be in the future."
      ts_load: "Date when the dataset was refreshed by the data load process."
      forecast_date: "Estimated movement completion date."
      material_name: material\product name
      total_product_weight: weight of the moved material\product
    source_type: csv
    source_location: data/curated/view_goods_movements.csv
    owner_team: SupplyChain
    data_owner: owner@example.com
    sla_tier: gold
    required_columns: [movement_id, material_id, quantity, movement_type, plant, movement_date, ts_load, forecast_date, material_name, total_product_weight]
    ts_load_column: ts_load
    freshness_max_age_days: 10
    validation_sql: dq_registry\etl_sql\view_goods_movements\view_goods_movements_full.sql
